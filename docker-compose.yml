version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: certificates_backend
    restart: always
    environment:
      - PORT=5000
      - NODE_ENV=production
      # يتم تمرير هذه المتغيرات من ملف .env على السيرفر
      - VIRTUAL_HOST=${DOMAIN:-localhost}
      - LETSENCRYPT_HOST=${DOMAIN:-localhost}
      - VIRTUAL_PORT=5000
    env_file:
      - .env
    volumes:
      - ./server/data:/app/server/data
      - ./server/public/certificates:/app/server/public/certificates
    networks:
      - web-network

  # ملاحظة: حاويات Nginx Proxy و Let's Encrypt يفضل تشغيلها بشكل منفصل أو فك التعليق أدناه
